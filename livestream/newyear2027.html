<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global New Year Countdown Dashboard</title>
<style>
body {
  margin: 0;
  font-family: "Segoe UI", Roboto, sans-serif;
  background: url('https://raw.githubusercontent.com/Jabul6969/website/refs/heads/main/src/backgroundofthewildwildwest.gif') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
}
.main { display: grid; grid-template-rows: auto auto 1fr; gap: 10px; padding: 10px; }
.top-title { background: rgba(26,26,26,0.7); border-radius: 6px; padding: 20px; text-align:center; font-size:32px; font-weight:700; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.top-info { background: rgba(26,26,26,0.7); border-radius: 6px; padding: 10px; text-align: center; font-size: 16px; color: #0f9; font-weight:600; display:flex; justify-content:center; align-items:center; }
.panels { display: grid; grid-template-columns: repeat(3,1fr); grid-auto-rows: 180px; gap: 10px; }
.panel { background: rgba(0,0,0,0.7); border-radius:6px; padding:20px; position:relative; overflow:hidden; text-align:center; border: 2px solid #333; }
.panel.active { border: 2px solid #0f9; box-shadow: 0 0 15px rgba(0,255,153,0.3); }
.panel h2 { margin:0 0 10px; font-size:20px; }
.big { font-size:48px; font-weight:700; margin-bottom:5px; font-family: 'Courier New', monospace; display:flex; justify-content:center; gap:4px; }
.digit-column { position: relative; width: 1ch; height: 1em; overflow: hidden; display: inline-block; font-variant-numeric: tabular-nums; }
.digit-track { position: absolute; top: 0; left: 0; transition: transform 0.5s ease-in-out; }
.digit-track span { display: block; height: 1em; text-align: center; }
.labels { display:flex; justify-content:center; gap:30px; font-size:14px; margin-bottom:5px; }
.timezone { position:absolute; bottom:10px; left:10px; font-size:14px; opacity:0.7; }
.localtime { position:absolute; bottom:10px; right:10px; font-size:14px; opacity:0.7; }
</style>
</head>
<body>
<div class="main">
  <div class="top-title">New Year 2027 Countdown</div>
  <div class="top-info">
    Current Zone: <span id="currentZone"></span> | 
    Progress: <span id="progress"></span>
  </div>
  <div class="panels" id="panels"></div>
</div>

<script>
const panelsEl = document.getElementById('panels');
const currentZoneEl = document.getElementById('currentZone');
const progressEl = document.getElementById('progress');
const targetYear = 2027;

// Using IANA timezone IDs for accuracy including DST
const allZones = [
  {tz:'Pacific/Auckland', country:'New Zealand'},
  {tz:'Australia/Sydney', country:'Australia'},
  {tz:'Asia/Tokyo', country:'Japan'},
  {tz:'Asia/Manila', country:'Philippines'},
  {tz:'Asia/Bangkok', country:'Thailand'},
  {tz:'Asia/Dhaka', country:'Bangladesh'},
  {tz:'Asia/Karachi', country:'Pakistan'},
  {tz:'Asia/Dubai', country:'UAE'},
  {tz:'Europe/Moscow', country:'Russia'},
  {tz:'Africa/Johannesburg', country:'South Africa'},
  {tz:'Europe/Paris', country:'France'},
  {tz:'Europe/London', country:'UK'},
  {tz:'Atlantic/Cape_Verde', country:'Cape Verde'},
  {tz:'Atlantic/South_Georgia', country:'Mid-Atlantic'},
  {tz:'America/Sao_Paulo', country:'Brazil'},
  {tz:'America/Toronto', country:'Canada (East)'},
  {tz:'America/New_York', country:'USA (East)'},
  {tz:'America/Chicago', country:'USA (Central)'},
  {tz:'America/Denver', country:'USA (Mountain)'},
  {tz:'America/Los_Angeles', country:'USA (Pacific)'},
  {tz:'America/Anchorage', country:'Alaska'},
  {tz:'Pacific/Honolulu', country:'Hawaii'},
  {tz:'Pacific/Pago_Pago', country:'American Samoa'}
];

let currentStartIndex = 0;
const panels = [];

// Format milliseconds into DD:HH:MM:SS
function fmt(ms){
  if(ms<=0) return {days:'--', hours:'--', minutes:'--', seconds:'--'};
  const s=Math.floor(ms/1000);
  const d=Math.floor(s/86400);
  const h=Math.floor((s%86400)/3600);
  const m=Math.floor((s%3600)/60);
  const sec=s%60;
  return {
    days:String(d).padStart(2,'0'),
    hours:String(h).padStart(2,'0'),
    minutes:String(m).padStart(2,'0'),
    seconds:String(sec).padStart(2,'0')
  };
}

// Get remaining time to New Year in a timezone using IANA ID
function getRemaining(tz){
  const now = new Date();
  // Use Intl API to get the local time in target timezone
  const options = {timeZone: tz, hour12:false, year:'numeric', month:'numeric', day:'numeric', hour:'numeric', minute:'numeric', second:'numeric'};
  const formatter = new Intl.DateTimeFormat('en-US', options);
  const parts = formatter.formatToParts(now);
  let year = targetYear, month = 0, day = 1, hour = 0, minute = 0, second = 0;
  for(const p of parts){
    if(p.type==='year') year = parseInt(p.value);
    if(p.type==='month') month = parseInt(p.value)-1;
    if(p.type==='day') day = parseInt(p.value);
    if(p.type==='hour') hour = parseInt(p.value);
    if(p.type==='minute') minute = parseInt(p.value);
    if(p.type==='second') second = parseInt(p.value);
  }
  // Target New Year local time in tz
  const targetStr = new Date(Date.UTC(year, month, day, hour, minute, second));
  // Create actual Date object for Jan 1, 00:00 in tz
  const target = new Date(new Intl.DateTimeFormat('en-US', {timeZone: tz, hour12:false, year:'numeric', month:'numeric', day:'numeric', hour:'numeric', minute:'numeric', second:'numeric'})
                         .format(new Date(Date.UTC(targetYear,0,1,0,0,0))));
  return target - now;
}

// Local time string
function getLocalTime(tz){
  return new Intl.DateTimeFormat('en-US', {timeZone: tz, hour12:true, hour:'numeric', minute:'2-digit'}).format(new Date());
}

function renderPanels(){
  panelsEl.innerHTML = '';
  panels.length = 0;
  for(let i=0;i<allZones.length;i++){
    const idx = (currentStartIndex+i)%allZones.length;
    const z = allZones[idx];
    const panel = document.createElement('div');
    panel.className = 'panel';
    if(i===0) panel.classList.add('active');

    const title = document.createElement('h2'); 
    title.textContent = z.country;

    const bigDiv = document.createElement('div'); 
    bigDiv.className='big';

    const countdownStr = "000:00:00:00";
    for (let j = 0; j < countdownStr.length; j++) {
      const char = countdownStr[j];
      if (/[0-9]/.test(char)) {
        const column = document.createElement('div');
        column.className='digit-column';
        const track = document.createElement('div');
        track.className='digit-track';
        for (let d = 0; d <= 9; d++) {
          const span = document.createElement('span');
          span.textContent = d;
          track.appendChild(span);
        }
        column.appendChild(track);
        bigDiv.appendChild(column);
      } else {
        const span = document.createElement('span');
        span.textContent = char;
        span.style.display = 'inline-block';
        span.style.width = '0.6ch';
        span.style.textAlign = 'center';
        bigDiv.appendChild(span);
      }
    }

    const labelsDiv = document.createElement('div'); 
    labelsDiv.className='labels';
    ['Days','Hours','Minutes','Seconds'].forEach(l=>{
      const lbl=document.createElement('div'); 
      lbl.textContent=l; 
      labelsDiv.appendChild(lbl);
    });

    const tzDiv=document.createElement('div'); 
    tzDiv.className='timezone'; 
    tzDiv.textContent=`${z.tz}`;
    const localDiv=document.createElement('div'); 
    localDiv.className='localtime'; 
    localDiv.textContent='00:00 AM';

    panel.append(title,bigDiv,labelsDiv,tzDiv,localDiv);
    panelsEl.appendChild(panel);
    panels.push({panel, bigDiv, tzDiv, localDiv, zone:z});
  }
  updateTopInfo();
}

function updateTopInfo(){
  currentZoneEl.textContent = `${panels[0].zone.country} (${panels[0].zone.tz})`;
  progressEl.textContent = `${(currentStartIndex+1)}/${allZones.length}`;
}

function animateDigits(bigDiv, newText){
  const columns = bigDiv.querySelectorAll('.digit-column');
  let colIndex = 0;
  for (let i = 0; i < newText.length; i++) {
    const char = newText[i];
    if (/[0-9]/.test(char)) {
      const track = columns[colIndex].querySelector('.digit-track');
      track.style.transform = `translateY(-${parseInt(char)}em)`;
      colIndex++;
    }
  }
}

function tick(){
  let rotate = false;
  panels.forEach((p,i)=>{
    const remaining = getRemaining(p.zone.tz);
    const t = fmt(remaining);
    const text = `${t.days}:${t.hours}:${t.minutes}:${t.seconds}`;
    animateDigits(p.bigDiv, text);
    p.localDiv.textContent = getLocalTime(p.zone.tz);
    if(i === 0 && remaining <= 0){rotate = true;}
  });
  if(rotate){
    currentStartIndex = (currentStartIndex+1)%allZones.length;
    renderPanels();
  }
}

renderPanels();
setInterval(tick,1000);
</script>
</body>
</html>
